                    type: problems/type/INPUT_VALIDATION
                    title: Invalide Eingabe
                    status: 400
                    detail: '7006: Fehler bei JSON-Konvertierung für URL-Query-Parameter request_json=''{Nonsense-Eingabe'''
                    instance: problems/instance/RequestJsonProcessing
                Fehlende Organisationsschlüssel-Angabe:
                  description: Fehlende Organisationsschlüssel-Angabe
                  value:
                    type: problems/type/SERVICE_VALIDATION
                    title: Invalider Request
                    status: 400
                    detail: Parameter 'organizationKey' fehlt
                    instance: problems/instance/RestValidation

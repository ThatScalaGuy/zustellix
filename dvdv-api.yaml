                  description: Falsche Parameter
                  value:
                    type: problems/type/INPUT_VALIDATION
                    title: Invalide Eingabe
                    status: 400
                    detail: '7006: Fehler bei JSON-Konvertierung für URL-Query-Parameter request_json=''{"serviceElementType":"Irrtum","parameterType":"Hier ist ein","parameterValue":"Fehler im Request"}'''
                    instance: problems/instance/RequestJsonProcessing
  '/{entryPath}/v2/findservicedescription':
    get:
      summary: 'findservicedescription_v2: Ermittlung eines gültigen Diensts'
      description: Entspricht der Schnittstelle 'FindServiceDescription' des Altsystems DVDV 1. Wird benutzt von der DVDV-Bibliotheks-Funktion findServiceDescription. Die Schnittstelle liefert zu einem gegebenen Organisationsschlüssel und einer Dienstbeschreibungs-URI die Beschreibung des aktuell gültigen Dienstes mit allen Verbindungsparametern. Vom DirectoryRequestDto müssen dementsprechend nur die Felder 'organizationKey' und 'serviceSpecificationUri' gefüllt sein.
      operationId: findServiceDescription
      parameters:
        - name: entryPath
          in: path
          description: URI-Präfix inkl. Authentifizierungsvariante
          required: true
          schema:
            pattern: intern\/directory|extern\/bundesmasterauth\/directory|extern\/standaloneauth\/directory
            type: string
            enum:
              - intern/directory
              - extern/bundesmasterauth/directory
              - extern/standaloneauth/directory
        - name: request_json
          in: query
          description: JSON-String mit Feldern 'organizationKey' und 'serviceSpecificationUri'
          required: true
          schema:
            type: string
          example: '{"organizationKey":"ags:01999001","serviceSpecificationUri":"http://www.osci.de/xauslaender1100/xauslaender1100ABHABH.wsdl"}'
      responses:
        '200':
          description: Aktion erfolgreich ausgeführt
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/Service'
        '204':
          description: 'Kein gültiger passender Dienst gefunden. Für den Fall, dass ein ungültiger passender Dienst gefunden wurde, beachten Sie den Header dvdv-warning-msg. Dieser enthält ggf. eine RFC-2047-kodierte Warnungsmeldung.'
        '400':
          description: Es wurden ungültige Anfrageparameter übermittelt.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                Nicht-wohlgeformtes JSON:
                  description: Nicht-wohlgeformtes JSON
                  value:
                    type: problems/type/INPUT_VALIDATION
                    title: Invalide Eingabe
                    status: 400
                    detail: '7006: Fehler bei JSON-Konvertierung für URL-Query-Parameter request_json=''{Nonsense-Eingabe'''
                    instance: problems/instance/RequestJsonProcessing
        '404':
          description: Kein gültiger passender Dienst gefunden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                Kein Treffer:
                  description: Kein Treffer
                  value:
                    type: problems/type/ENTITY_NOT_FOUND
                    title: Entität nicht gefunden
                    status: 404
                    detail: '5005: Kein Dienst zum Organisationsschlüssel ''ags:gibsnich'' und URI http://www.osci.de/xinneres/rueckweisung/3/xinneresrueckweisungv3.wsdl.'
                    instance: problems/instance/DirectoryEntityNotFound
  '/{entryPath}/v2/findServiceSpecificationUrisByCategory':
    get:
      summary: findServiceSpecificationUrisByCategory
      description: 'Liefert alle Dienstbeschreibungs-URIs, die von Organisationen der angegebenen Kategorie angeboten werden dürfen.'
      operationId: findServiceSpecificationUrisByCategory
      parameters:
        - name: entryPath
          in: path
          description: URI-Präfix inkl. Authentifizierungsvariante
          required: true
          schema:
            pattern: intern\/directory|extern\/bundesmasterauth\/directory|extern\/standaloneauth\/directory
            type: string
            enum:
              - intern/directory
              - extern/bundesmasterauth/directory
              - extern/standaloneauth/directory
        - name: request_json
          in: query
          description: JSON-String mit dem Feld 'category'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Aktion erfolgreich ausgeführt
          content:
            application/json; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceBase'
        '401':
          description: 'Nicht authentifiziert. Es ist eine Authentifizierung notwendig, um diese Aktion auszuführen.'
  '/{entryPath}/v2/version':
    get:
      summary: getServiceVersion
      description: 'Gibt die Version der Software des DVDV2-Servers als JSON zurück. Keys: version, buildnunmber, schemaversion'
      operationId: getServiceVersion
      parameters:
        - name: entryPath
          in: path
          description: URI-Präfix inkl. Authentifizierungsvariante
          required: true
          schema:
            pattern: intern\/directory|extern\/bundesmasterauth\/directory|extern\/standaloneauth\/directory
            type: string
            enum:
              - intern/directory
              - extern/bundesmasterauth/directory
              - extern/standaloneauth/directory
      responses:
        '200':
          description: Aktion erfolgreich ausgeführt
          content:
            application/json; charset=utf-8:
              schema:
                type: string
        '401':
          description: 'Nicht authentifiziert. Es ist eine Authentifizierung notwendig, um diese Aktion auszuführen.'
  '/{entryPath}/v2/verifycategory':
    get:
      summary: 'verifycategory: Kategorienüberprüfung'
      description: 'Entspricht der Schnittstelle ''VerifyCategory'' des Altsystems DVDV 1. Wird benutzt von der DVDV-Bibliotheks-Funktion verifyCategory. Die Schnittstelle liefert zu einem gegebenen Zertifikat-Fingerprint und der zugeordneten Organisationskategorie ein Prüfergebnis ''true'' oder ''false''. Das Ergebnis ist genau dann ''true'', wenn es eine Organisation mit der angegebenen Organisationskategorie gibt, für die das übermittelte Zertifikat als Client-Zertifikat hinterlegt ist. Vom DirectoryRequestDto müssen dementsprechend nur die Felder ''fingerPrint'' und ''category'' gefüllt sein.'
      operationId: verifyCategory
      parameters:
        - name: entryPath
          in: path
          description: URI-Präfix inkl. Authentifizierungsvariante
          required: true
          schema:
            pattern: intern\/directory|extern\/bundesmasterauth\/directory|extern\/standaloneauth\/directory
            type: string
            enum:
              - intern/directory
              - extern/bundesmasterauth/directory
              - extern/standaloneauth/directory
        - name: request_json
          in: query
          description: JSON-String mit Feldern 'fingerPrint' und 'category'
          required: true
          schema:
            type: string
          example: '{"fingerPrint":"11:51:43:a1:b5:fc:8b:b7:0a:3a:a9:b1:0f:66:73:22","category":"Behörde"}'
      responses:
        '200':
          description: Aktion erfolgreich ausgeführt
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/VerificationResult'
        '400':
          description: Es wurden ungültige Anfrageparameter übermittelt.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                Nicht-wohlgeformtes JSON:
                  description: Nicht-wohlgeformtes JSON
                  value:
                    type: problems/type/INPUT_VALIDATION
                    title: Invalide Eingabe
                    status: 400
                    detail: '7006: Fehler bei JSON-Konvertierung für URL-Query-Parameter request_json=''{Nonsense-Eingabe'''
                    instance: problems/instance/RequestJsonProcessing
                Fehlende Kategorie-Angabe:
                  description: Fehlende Kategorie-Angabe
                  value:
                    type: problems/type/SERVICE_VALIDATION
                    title: Invalider Request
                    status: 400
                    detail: Parameter 'category' fehlt
                    instance: problems/instance/RestValidation
components:
  schemas:
    AccessToken:
      type: object
      properties:
        access_token:
          type: string
          description: 'Das eigentliche Token, das der Aufrufer in nachfolgenden Requests im Authorization-Header im Schlüssel ''EmbeddedBearer'' benutzen sollte.'
        expires_in:
          type: integer
          description: Zeit bis zum  Verfall in Sekunden.
          format: int64
        refresh_expires_in:
          type: integer
          description: |-
            Zeit bis zum Verfall des Refresh-Tokens in Sekunden
            Hinweis: Token-Refresh wird zurzeit nicht unterstützt und ist auch nicht sinnvoll.
          format: int64
        refresh_token:
          type: string
          description: 'Hinweis: Token-Refresh wird zurzeit nicht unterstützt und ist auch nicht sinnvoll.'
        token_type:
          type: string
        id_token:
          type: string
        not-before-policy:
          type: integer
          format: int32
        session_state:
          type: string
        scope:
          type: string
        otherClaims:
          type: object
          additionalProperties:
            type: object
      description: Access-Token gemäß OpenIdConnect-Standard.
    Problem:
      type: object
      properties:
        instance:
          type: string
          description: 'Relative URI-Referenz, die das spezifische Auftreten dieses Problems identifiziert. Änderungen hieran gelten als "non-breaking change".'
          format: URI reference
        type:
          type: string
          description: 'Relative URI-Referenz, die den Problemtyp bestimmt. Änderungen hieran gelten als "breaking change", daher eignet sich der Rückgabewert zum Switchen.'
          format: URI reference
        status:
          type: integer
          description: 'HTTP status code (https://datatracker.ietf.org/doc/html/rfc7231#section-6) vom DVDV-Server.'
          format: int32
        title:
          type: string
          description: 'Kurze, nutzerlesbare Beschreibung des Problemtyps.'
        detail:
          type: string
          description: 'Nutzerlesbare, detallierte Beschreibung des Problems.'
    Request:
      type: object
      properties:
        fingerPrint:
          maxLength: 40
          minLength: 40
          type: string
          description: Zertifikat-Fingerprint
          example: 0272c56c9742a62501329a3aa78974f1605c92a2
        category:
          maxLength: 255
          type: string
          description: Eindeutige Behördenkategoriebezeichnung
          example: Meldebehörde
        organizationKey:
          maxLength: 255
          minLength: 6
          type: string
          description: Behördenschlüsselname
          example: 'ags:05009999'
        serviceSpecificationUri:
          maxLength: 1000
          minLength: 9
          type: string
          description: Name der Dienstbeschreibungs-URI
        serviceElementType:
          type: string
          description: Typ der Dienstbeschreibung
          enum:
            - OSCI_INTERMEDIARY
            - OSCI_ADDRESSEE
            - CIPHER_CERTIFICATE
            - SIGNATURE_CERTIFICATE
            - WEBSERVER
            - TEXT
        customServiceElementType:
          type: string
          description: Name des konfigurierbaren Typs der Dienstbeschreibung (falls serviceElementType fehlt)
        parameterType:
          type: string
          description: Typ des Anfrageparameters
          enum:
            - CIPHER_CERTIFICATE
            - SIGNATURE_CERTIFICATE
            - URI
        parameterValue:
          type: string
          description: Wert des Anfrageparameters. Die Bedeutung hängt ab von parameterType.
      description: Generisches Requestobjekt für verschiedene Anfragen an die Directory/Legacy-Schnittstelle
    Certificate:
      type: object
      properties:
        content:
          type: string
          description: Zertifikatdatei als Base64-enkodierter String
        fingerprint:
          maxLength: 40
          minLength: 40
          type: string
          description: Fingerprint
          format: hexadezimal
          example: 0272c56c9742a62501329a3aa78974f1605c92a2
        serial:
          maxLength: 49
          type: string
          description: Seriennummer (Dezimaldarstellung)
          format: dezimal
        serialHex:
          maxLength: 40
          type: string
          description: Seriennummer (Hexadezimaldarstellung)
          format: hexadezimal
        emailSubject:
          maxLength: 255
          minLength: 3
          type: string
          description: E-Mail Inhaber
        algorithm:
          maxLength: 255
          minLength: 3
          type: string
          description: Verschlüsselungsalgorithmus
          example: SHA256withRSA
        nameIssuer:
          maxLength: 255
          type: string
          description: Name des Ausstellers
        nameSubject:
          maxLength: 255
          type: string
          description: Name des Inhabers
        organizationIssuer:
          maxLength: 255
          type: string
          description: Organization des Ausstellers
        organizationSubject:
          maxLength: 255
          type: string
          description: Organization des Inhabers
        ouIssuer:
          maxLength: 255
          type: string
          description: Ou-Issuer
        ouSubject:
          maxLength: 255
          type: string
          description: Ou-Subject
        validFrom:
          maxLength: 27
          minLength: 24

  '/{entryPath}/v2/findauthoritydescription':
    get:
      summary: 'findauthoritydescription: Organisationsermittlung'
      description: 'Entspricht der Schnittstelle ''FindAuthorityDescription'' des Altsystems DVDV 1. Wird benutzt von den DVDV-Bibliotheks-Funktionen findOrganizationDescription und findAuthorityDescription. Die Schnittstelle liefert zu einem gegebenen Organisationsschlüssel und der zugeordneten Organisationskategorie die Beschreibung der Organisation und des zugehörigen Organisation-Stellvertreters, sofern vorhanden. Vom DirectoryRequestDto müssen dementsprechend nur die Felder ''category'' und ''organizationKey'' gefüllt sein.'
      operationId: findAuthorityDescription
      parameters:
        - name: entryPath
          in: path
          description: URI-Präfix inkl. Authentifizierungsvariante
          required: true
          schema:
            pattern: intern\/directory|extern\/bundesmasterauth\/directory|extern\/standaloneauth\/directory
            type: string
            enum:
              - intern/directory
              - extern/bundesmasterauth/directory
              - extern/standaloneauth/directory
        - name: request_json
          in: query
          description: JSON-String mit Feldern 'category' und 'organizationKey'
          required: true
          schema:
            type: string
          example: '{"category":"Meldebehörde","organizationKey":"ags:01999001"}'
      responses:
        '200':
          description: Aktion erfolgreich ausgeführt
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/OrganizationDescription'
        '204':
          description: Organisation konnte nicht gefunden werden.
        '400':
          description: Es wurden ungültige Anfrageparameter übermittelt.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                Nicht-wohlgeformtes JSON:
                  description: Nicht-wohlgeformtes JSON
                  value:
                    type: problems/type/INPUT_VALIDATION
                    title: Invalide Eingabe
                    status: 400
                    detail: '7006: Fehler bei JSON-Konvertierung für URL-Query-Parameter request_json=''{Nonsense-Eingabe'''
                    instance: problems/instance/RequestJsonProcessing
                Fehlende Kategorie-Angabe:
                  description: Fehlende Kategorie-Angabe
                  value:
                    type: problems/type/SERVICE_VALIDATION
                    title: Invalider Request
                    status: 400
                    detail: Parameter 'category' fehlt
                    instance: problems/instance/RestValidation
        '404':
          description: Organisation konnte nicht gefunden werden.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                Kein Treffer:
                  description: Kein Treffer
                  value:
                    type: problems/type/ENTITY_NOT_FOUND
                    title: Entität nicht gefunden
                    status: 404
                    detail: '5009: Keine Organisation mit Kategorie "Meldebehörde" und Organisationsschlüssel "ags:irrtum" gefunden'
                    instance: problems/instance/DirectoryEntityNotFound

  '/{entryPath}/v2/findcategories':
    get:
      summary: 'findcategories: Kategorienermittlung'
      description: 'Wird benutzt von der DVDV-Bibliotheks-Funktion findCategories. Ermittelt diejenigen Kategorien (typischerweise genau eine), zu denen es eine Organisation mit dem gegebenen Client-Zertifikat und Organisationsschlüssel gibt. Dabei handelt es sich um die Blätter des Kategorienbaumes, z.B. ''Meldebörde'', ''Passbehörde'', ''StA'''

openapi: 3.0.1
info:
  title: DVDV2 öffentliche API
  description: |-
    Öffentliche, lesende API für das DVDV, Version v2. 
    In diesem Dokument sind die öffentlichen Directory-Schnittstellen des DVDV2-Kernsystems in Version v2 dokumentiert. 

    __Der DVDV-Server bietet diese Schnittstelle inzwischen in der neueren Version v3 an. Bitte bevorzugen Sie diese.__ 

    Es richtet sich also an erstens an Fachverfahrens-Entwickler, die diese Schnittstellen direkt aufrufen wollen, statt eine der DVDV-Bibliotheken zu verwenden,
    und zweitens an Entwickler, die die Schnittstellen des DVDV2-Kernsystems nachbilden wollen.

    Die URL, unter der Sie die u.a. Endpunkte erreichen, ergibt sich aus der URL Ihres DVDV-Betreibers, gefolgt vom sogenannten 'entryPath/', gefolgt von der Schnittstellen-Version 'v2/', gefolgt vom jeweiligen Funktionsnamen.

    Diese Version v2 ersetzt in die bisherige Version v1 (für die die URL keine Schnittstellenversion enthielt) vollumfänglich. 
    Für den entryPath gibt es dabei folgende Werte: 

    (1) intern/directory (für rechenzentrumsinternen, unauthentifizierten Zugriff)

    (2) extern/standaloneauth/directory (für die Standalone-Authentifzierung, also mit einem vom DVDV-Server ausgestellten Token), und 

    (3) extern/bundesmasterauth/directory (für die Authentifizierung am IAM des Bundesmaster-Betreibers.).

    Damit ergibt sich z.B. https://ihr-dvdv-betreiber/dvdv2-backend/extern/standaloneauth/directory/findauthoritydescription

    Eine Sonderrolle spielt der Endpunkt extern/standaloneauth/token (siehe Methode createToken).
    Diesen benötigen Sie zum Erzeugen eines Tokens im Falle der Standalone-Authentifzierung.

    Wenn Sie diese Schnittstelle direkt aufrufen (ohne eine DVDV-Bibliothek), denken Sie daran, das vom Server bereitgestellte TLS-Zertifikat auf Gültigkeit und Vertrauenswürdigkeit des Herausgebers zu prüfen.
  contact:
    name: Dataport AöR
    url: 'https://www.dataport.de/'
    email: dvdv-development@dataport.de
  license:
    name: EUPL 1.2
    url: 'https://eupl.eu/1.2/de/'
  version: v2 - 2.15.0
paths:
  /extern/standaloneauth/token:
    post:
      summary: Liefert ein Access-Token
      description: |-
        Erzeugt ein Access-Token, mit dem der Aufrufer sich in nachfolgenden, fachlichen Requests authentifizieren kann.
        Diese Variante der Authentifizierung heißt 'Standalone-Authentifizierung'.
        Die Funktionsweise ist fast konform zu einem Spezialfall des OpenIdConnect-Standards:
        Die Request-Parameter und die Struktur der Response sind konform zum OpenIdConnect-Standard.
        Der Aufrufer fügt das in dieser Response enthalten Token in den nachfolgenden fachlichen Requests in den Standard-HTTP-Header 'Authorization' ein, 
        aber (und das ist die einzige Abweichung vom OpenIdConnect-Standard), mit dem Schlüssel 'EmbeddedBearer' anstelle von 'Bearer'.
      operationId: createToken
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  description: 'Der Wert sollte lauten: ''client_credentials'''
                client_assertion_type:
                  type: string
                  description: 'Der Wert sollte lauten: ''urn:ietf:params:oauth:client-assertion-type:jwt-bearer'''
                client_assertion:
                  type: string
                  description: 'Das RS256-signierte JWT-Token. Dieses JWT-Token muss ein subject der Form ''fp:<Zertifikatsfingerprint>'' haben für ein Client-Zertifikat im DVDV.'
      responses:
        '200':
          description: Aktion erfolgreich ausgeführt
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/AccessToken'
              examples:
                Tagesgültiges Token:
                  description: Tagesgültiges Token
                  value:
                    accessToken: eyJhbGciO..fC7CGKIZA
                    expiresIn: 86400
                    refreshExpiresIn: 0
                    tokenType: Bearer
                    notBeforePolicy: 0
                    scope: email profile dvdv2-kernsystem-application-client-scope
        '401':
          description: Kein passendes Client-Zertifikat
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                Kein passendes Client-Zertifikat:
                  description: Kein passendes Client-Zertifikat
                  value:
                    type: problems/type/AUTHENTICATION
                    title: Fehler bei der Standalone-Authentifizierung
                    status: 401
                    detail: Kein passendes Client-Zertifikat gefunden für fingerprint 0d...dd5
                    instance: problems/instance/StandaloneAuthentication
  '/{entryPath}/v2/batch/findauthoritydescription':
    post:
